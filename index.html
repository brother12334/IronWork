<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#131315">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Iron Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#131315; --card:#1c1c20; --card2:#232329; --line:#2e2e36;
  --text:#eceae4; --dim:#a09ea6; --faint:#75747c;
  --chest:#e05248; --back:#4a82e0; --arms:#e8b62c; --shoulders:#46a85c; --legs:#e9e5db;
  --ok:#46a85c; --bad:#e05248;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --disp:'Barlow Condensed',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font:16.5px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
}
#app{max-width:600px;margin:0 auto;padding:16px 14px 20px}
h1,h2,h3{font-family:var(--disp);text-transform:uppercase;letter-spacing:.04em;margin:0}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* header */
.hdr{display:flex;align-items:baseline;justify-content:space-between;margin:6px 2px 16px}
.hdr h1{font-size:32px;font-weight:700}
.hdr .date{color:var(--dim);font-family:var(--mono);font-size:13px}

/* rotation plate strip */
.plate.rest{
  background:var(--card2);color:var(--dim);
  box-shadow:none;border:2px dashed var(--faint);
}
.plate.rest.cur{border-style:solid;border-color:var(--text)}
.plates{display:flex;gap:9px;justify-content:space-between;margin:0 2px 18px}
.plate{
  flex:1;aspect-ratio:1;max-width:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.05em;
  color:var(--bg);cursor:pointer;position:relative;border:none;
  box-shadow:inset 0 0 0 4px rgba(0,0,0,.28), inset 0 0 0 11px rgba(255,255,255,.06);
  opacity:.34;transition:opacity .15s, transform .15s;
}
.plate.done{opacity:.85}
.pcheck{
  position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;
  background:var(--ok);color:#0d1a10;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--bg);
}
.cycle-row{display:flex;justify-content:space-between;align-items:center;margin:26px 2px 0;color:var(--faint);font-size:12px}
.cycle-row button{background:none;border:none;color:var(--faint);font:11px var(--mono);text-decoration:underline dotted;text-underline-offset:3px;cursor:pointer;padding:4px}
.feel-row{display:flex;gap:9px;margin-top:8px}
.feel-btn{
  width:52px;height:52px;font-size:27px;border-radius:12px;cursor:pointer;
  background:var(--card2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  opacity:.45;filter:grayscale(.6);transition:all .15s;
}
.feel-btn.on{opacity:1;filter:none;border-color:var(--ok);transform:scale(1.12)}
.rev-stat{margin:8px 0;font-size:15px;color:var(--text)}
.rev-head{font-family:var(--disp);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:16px 0 4px;border-bottom:1px solid var(--line);padding-bottom:5px}
.rev-line{display:flex;justify-content:space-between;gap:10px;padding:6px 0;font-size:14.5px}
.rev-line .num{color:var(--dim)}
.plate.cur{opacity:1;transform:scale(1.12);box-shadow:inset 0 0 0 4px rgba(0,0,0,.28), inset 0 0 0 11px rgba(255,255,255,.06), 0 0 0 2px var(--bg), 0 0 0 4px var(--text)}
.plate small{position:absolute;bottom:-18px;left:0;right:0;text-align:center;color:var(--faint);font:10px var(--mono);letter-spacing:0}
.plates-wrap{margin-bottom:30px}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.card h3{font-size:20px;margin-bottom:2px}
.sub{color:var(--dim);font-size:14px}
.sub .num{font-size:13px}

/* buttons */
.btn{
  display:block;width:100%;padding:17px;border-radius:14px;border:none;cursor:pointer;
  font-family:var(--disp);font-size:21px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  background:var(--text);color:var(--bg);
}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
.btn.small{width:auto;display:inline-block;padding:10px 16px;font-size:16px}
.btn:disabled{opacity:.4}
.btn-row{display:flex;gap:10px;margin-top:10px}
.btn-row .btn{flex:1}

/* exercise + set rows */
.ex{margin-bottom:14px}
.ex-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.ex-head b{font-size:17px}
.ex-target{color:var(--dim);font-size:13px;font-family:var(--mono);white-space:nowrap}
.ex-note{color:var(--faint);font-size:12.5px;margin-top:-4px;margin-bottom:8px}
.ex-last{
  display:flex;flex-wrap:wrap;gap:7px;align-items:center;
  margin:2px 0 12px;padding:9px 11px;
  background:var(--card2);border:1px solid var(--line);border-left:4px solid var(--dim);
  border-radius:11px;
}
.ex-insight{display:flex;gap:9px;align-items:baseline;font-size:13.5px;color:var(--text);margin:-6px 0 12px;line-height:1.4}
.ins-tag{
  flex-shrink:0;font-family:var(--disp);font-size:11.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.09em;color:var(--arms);
  border:1px solid rgba(232,182,44,.45);padding:2px 8px;border-radius:6px;
}
.ll-tag{
  font-family:var(--disp);font-size:12px;font-weight:700;line-height:1.15;
  text-transform:uppercase;letter-spacing:.09em;color:var(--dim);margin-right:3px;
}
.ll-set{
  font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:15.5px;font-weight:600;
  color:var(--text);background:rgba(255,255,255,.07);
  padding:5px 10px;border-radius:8px;white-space:nowrap;
}
.alt-badge{
  display:inline-block;font:11.5px var(--mono);color:var(--bg);background:var(--dim);
  border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;
}
.set{display:grid;grid-template-columns:38px 1fr 1fr 86px 48px;gap:7px;align-items:center;margin-bottom:8px}
.set .idx{color:var(--faint);font:14px var(--mono);text-align:center}
.set input{
  width:100%;padding:13px 8px;border-radius:11px;border:1px solid var(--line);
  background:var(--card2);color:var(--text);font-family:var(--mono);font-size:17px;text-align:center;
}
.set input::placeholder{color:var(--faint)}
.set select{
  width:100%;padding:13px 2px;border-radius:11px;border:1px solid var(--line);
  background:var(--card2);color:var(--text);font-family:var(--mono);font-size:16px;text-align:center;appearance:none;
}
.set .chk{
  width:48px;height:48px;border-radius:11px;border:1px solid var(--line);background:var(--card2);
  color:var(--faint);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.set .chk.on{background:var(--ok);border-color:var(--ok);color:#0d1a10}
.set-labels{display:grid;grid-template-columns:38px 1fr 1fr 86px 48px;gap:7px;color:var(--faint);font:11px var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.set-labels span{text-align:center}
.rpe-help{cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px}
.last{color:var(--faint);font:12px var(--mono);grid-column:2/6;margin-top:-4px;margin-bottom:2px;padding-left:2px}

/* workout picker */
.picker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.picker button{
  padding:17px;border-radius:14px;border:1px solid var(--line);background:var(--card2);
  color:var(--text);font-family:var(--disp);font-size:18px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;cursor:pointer;display:flex;align-items:center;gap:10px;
}
.dot{width:15px;height:15px;border-radius:50%;box-shadow:inset 0 0 0 3px rgba(0,0,0,.3);flex-shrink:0}

/* history */
.sess{cursor:pointer}
.sess .row1{display:flex;justify-content:space-between;align-items:baseline}
.sess .row1 b{font-size:17px}
.sess .detail{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;display:none}
.sess.open .detail{display:block}
.sess .detail .exline{margin-bottom:8px;font-size:14px}
.sess .detail .exline .num{color:var(--dim);font-size:13px}

/* program editor */
.prog-ex{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:8px}
.prog-ex:last-child{border-bottom:none}
.prog-ex b{font-size:16px}
.prog-ex .meta{font:12.5px var(--mono);color:var(--dim);margin-top:2px}
.icon-btns{display:flex;gap:5px;flex-shrink:0}
.icon-btns button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--dim);cursor:pointer;font-size:15px}
.ex-ctl button{width:32px;height:32px;font-size:13px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;z-index:50}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:22px;margin-bottom:12px}
.modal p{font-size:15px;color:var(--dim);margin:8px 0}
.modal .rpe-scale{font-family:var(--mono);font-size:14px;line-height:2;color:var(--text)}
.field{margin-bottom:12px}
.field label{display:block;color:var(--dim);font:12px var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.field input,.field textarea{
  width:100%;padding:13px;border-radius:11px;border:1px solid var(--line);
  background:var(--card2);color:var(--text);font-size:16px;font-family:inherit;
}
.field .duo{display:flex;gap:8px}
.field .duo input{flex:1}
.togglerow{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:15px}
.togglerow input{width:22px;height:22px;accent-color:var(--ok)}

/* tabs */
nav{
  position:fixed;bottom:0;left:0;right:0;background:rgba(19,19,21,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:9px 0 calc(9px + env(safe-area-inset-bottom));z-index:40;
}
nav button{
  background:none;border:none;color:var(--faint);cursor:pointer;
  font-family:var(--disp);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  padding:10px 16px;border-radius:10px;
}
nav button.on{color:var(--text);background:var(--card2)}

/* toast */
#toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);padding:12px 20px;border-radius:12px;
  font:14px var(--mono);opacity:0;pointer-events:none;transition:all .25s;z-index:60;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.fin-label{font-family:var(--disp);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);border-top:1px dashed var(--line);padding-top:12px;margin:6px 0 10px}
.syncdot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-left:9px;vertical-align:middle;background:var(--faint)}
.empty{color:var(--faint);text-align:center;padding:34px 10px;font-size:15px}
.danger{color:var(--bad)}
a{color:var(--text)}

/* ================= ANIMATIONS ================= */
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
#app>.card{animation:slideUp .5s cubic-bezier(.16,1,.3,1) both}
#app>.card:nth-of-type(2){animation-delay:.06s}
#app>.card:nth-of-type(3){animation-delay:.12s}
#app>.card:nth-of-type(4){animation-delay:.18s}
#app>.card:nth-of-type(5){animation-delay:.24s}
#app>.card:nth-of-type(6){animation-delay:.3s}
#app>.card:nth-of-type(7){animation-delay:.36s}
#app>.card:nth-of-type(n+8){animation-delay:.42s}

@keyframes ringPulse{0%{transform:scale(.8);opacity:.9}75%{transform:scale(1.3);opacity:0}100%{transform:scale(1.3);opacity:0}}
.plate{overflow:visible}
.plate.cur::after{content:"";position:absolute;inset:-7px;border-radius:50%;border:3px solid rgba(255,255,255,.55);animation:ringPulse 1.7s ease-out infinite;pointer-events:none}

@keyframes bounceIn{0%{transform:scale(0)}55%{transform:scale(1.45)}100%{transform:scale(1)}}
.pcheck{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both}

@keyframes pop{0%{transform:scale(.6)}55%{transform:scale(1.18)}100%{transform:scale(1)}}
.set .chk.on{animation:pop .32s cubic-bezier(.34,1.56,.64,1)}

.btn{transition:transform .12s}
.btn:active{transform:scale(.96)}
@keyframes btnGlow{0%,100%{box-shadow:0 0 0 0 rgba(236,234,228,0)}50%{box-shadow:0 0 26px 3px rgba(236,234,228,.4)}}
#startBtn{animation:btnGlow 2.6s ease-in-out infinite}

@keyframes dotPulse{50%{transform:scale(1.6);opacity:.55}}
.syncdot.pulse{animation:dotPulse .9s ease-in-out infinite}

@keyframes shakeX{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}50%{transform:translateX(-4px)}}
body.shake{animation:shakeX .55s both}

#celebrate{
  position:fixed;inset:0;z-index:100;overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#celebrate.out{opacity:0;transition:opacity .45s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cele-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 42%, rgba(0,0,0,.5), rgba(0,0,0,.84));animation:fadeIn .3s both}
.cele-stack{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:clamp(14px,3vh,26px);
  padding:20px;transform:translateY(-3vh);max-width:92vw;
  transition:transform .45s ease;
}
#celebrate.out .cele-stack{transform:translateY(-3vh) scale(.9)}
@keyframes plateSlam{
  0%{transform:translateY(-120vh) scale(1.5) rotate(-28deg)}
  58%{transform:translateY(0) scale(.93) rotate(2deg)}
  78%{transform:translateY(-8px) scale(1.05) rotate(-1deg)}
  100%{transform:translateY(0) scale(1) rotate(0)}
}
@keyframes plateFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(1.6deg)}}
.slam{
  position:relative;width:min(58vw,270px);aspect-ratio:1;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:700;font-size:min(17vw,80px);letter-spacing:.06em;color:var(--bg);
  box-shadow:inset 0 0 0 9px rgba(0,0,0,.28), inset 0 0 0 24px rgba(255,255,255,.08), 0 0 80px 14px rgba(255,255,255,.22);
  animation:plateSlam .6s cubic-bezier(.24,1.3,.4,1) both, plateFloat 2.6s .8s ease-in-out infinite;
}
.slam::before{
  content:"";position:absolute;inset:0;border-radius:50%;
  border:5px solid rgba(255,255,255,.75);
  animation:shockwave .85s .5s ease-out both;pointer-events:none;
}
@keyframes shockwave{0%{transform:scale(1);opacity:.85}100%{transform:scale(2);opacity:0}}
@keyframes textPop{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
.cele-text{
  text-align:center;font-family:var(--disp);font-weight:700;
  font-size:clamp(26px,9vw,44px);letter-spacing:.09em;text-transform:uppercase;line-height:1.1;
  color:#fff;text-shadow:0 0 34px rgba(255,255,255,.55), 0 3px 0 rgba(0,0,0,.35);
  animation:textPop .5s .3s cubic-bezier(.34,1.56,.64,1) both;
}
.cele-vol{
  font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:clamp(16px,4.5vw,21px);
  letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.9);
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);
  padding:9px 18px;border-radius:999px;
  animation:textPop .5s .6s cubic-bezier(.34,1.56,.64,1) both;
}
.cele-hint{
  position:absolute;bottom:max(24px, env(safe-area-inset-bottom));left:0;right:0;text-align:center;
  font:11px var(--mono);letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4);
  animation:fadeIn .4s 1.4s both;
}
@keyframes confFall{to{transform:translateY(118vh) rotate(760deg)}}
.confetto{position:absolute;top:-36px;animation:confFall linear both;will-change:transform}

@keyframes prUp{0%{opacity:0;transform:translateY(4px) scale(.5)}18%{opacity:1;transform:translateY(-10px) scale(1.25)}100%{opacity:0;transform:translateY(-56px) scale(1)}}
.pr-float{
  position:fixed;z-index:99;pointer-events:none;
  font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:.06em;color:var(--arms);
  text-shadow:0 0 18px rgba(232,182,44,.9);animation:prUp 1.25s ease-out both;
}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

/* ================= SPLASH ================= */
#splash{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#splash.bye{opacity:0;transition:opacity .45s ease}
#splash.bye .splash-inner{transform:scale(1.06);transition:transform .45s ease}
.splash-inner{display:flex;flex-direction:column;align-items:center;gap:6px}
.splash-inner svg{overflow:visible;animation:logoPump .55s 1s cubic-bezier(.34,1.56,.64,1) both}
@keyframes logoPump{0%{transform:translateY(0)}40%{transform:translateY(16px)}75%{transform:translateY(-8px)}100%{transform:translateY(0)}}
.sp-left,.sp-right,.sp-bar{transform-box:fill-box;transform-origin:center}
.sp-left{animation:slideL .6s .12s cubic-bezier(.22,1.3,.36,1) both}
.sp-right{animation:slideR .6s .12s cubic-bezier(.22,1.3,.36,1) both}
@keyframes slideL{from{transform:translateX(-190px);opacity:0}30%{opacity:1}to{transform:none;opacity:1}}
@keyframes slideR{from{transform:translateX(190px);opacity:0}30%{opacity:1}to{transform:none;opacity:1}}
.sp-bar{animation:barIn .35s .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes barIn{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}
.spark{transform-box:fill-box;transform-origin:center;opacity:0;filter:drop-shadow(0 0 6px rgba(200,150,70,.9))}
.spark1{animation:sparkIn .5s .95s cubic-bezier(.34,1.56,.64,1) both, twinkle 1.1s 1.45s ease-in-out infinite}
.spark2{animation:sparkIn .5s 1.15s cubic-bezier(.34,1.56,.64,1) both, twinkle 1.1s 1.75s ease-in-out infinite}
@keyframes sparkIn{from{transform:scale(0) rotate(-120deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes twinkle{
  0%,100%{opacity:1;transform:scale(1) rotate(0);filter:drop-shadow(0 0 9px rgba(220,170,90,1))}
  50%{opacity:.3;transform:scale(.7) rotate(18deg);filter:drop-shadow(0 0 2px rgba(200,150,70,.3))}
}
.splash-word{
  font-family:var(--disp);font-size:34px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;
  color:#fff;animation:wordPunch .5s 1.15s cubic-bezier(.22,1.4,.36,1) both;
}
@keyframes wordPunch{
  0%{opacity:0;transform:scale(2.8);filter:blur(6px)}
  55%{opacity:1;transform:scale(.9);filter:blur(0)}
  78%{transform:scale(1.08)}
  100%{opacity:1;transform:scale(1)}
}
</style>
</head>
<body>
<div id="splash" aria-hidden="true">
  <div class="splash-inner">
    <svg viewBox="0 0 512 512" width="min(64vw,300px)" height="min(64vw,300px)">
      <g transform="rotate(-45 256 256)">
        <g class="sp-left">
          <rect x="152" y="146" width="36" height="220" rx="18" fill="#fff"/>
          <rect x="104" y="166" width="36" height="180" rx="18" fill="#fff"/>
          <rect x="56"  y="226" width="34" height="60"  rx="17" fill="#fff"/>
        </g>
        <g class="sp-right">
          <rect x="324" y="146" width="36" height="220" rx="18" fill="#fff"/>
          <rect x="372" y="166" width="36" height="180" rx="18" fill="#fff"/>
          <rect x="422" y="226" width="34" height="60"  rx="17" fill="#fff"/>
        </g>

      <path class="spark spark2" d="M400 348 C406 394 410 398 456 404 C410 410 406 414 400 460 C394 414 390 410 344 404 C390 398 394 394 400 348 Z" fill="none" stroke="#b08344" stroke-width="6"/>

<div id="toast"></div>

<script>
"use strict";
/* ================= DATA ================= */
const LS_KEY = "ironlog.v1";
const GIST_FILE = "ironlog-data.json";
const ROTATION = ["chest","back","arms","shoulders","chest","arms","legs"];
const META = {
  chest:{name:"Chest", short:"CH", color:"var(--chest)"},
  back:{name:"Back", short:"BK", color:"var(--back)"},
  arms:{name:"Arms", short:"AR", color:"var(--arms)"},
  shoulders:{name:"Shoulders", short:"SH", color:"var(--shoulders)"},
  legs:{name:"Legs", short:"LG", color:"var(--legs)"}
};
const RPE_INFO_TITLE = "What is RPE?";
const RPE_INFO_HTML = `
<p><b>RPE</b> stands for <b>Rate of Perceived Exertion</b> — how hard a set felt, on a scale of 1 to 10.</p>
<div class="rpe-scale">
RPE 10 &nbsp;→ all-out, no reps left<br>
RPE 9 &nbsp;&nbsp;→ 1 rep left in the tank<br>
RPE 8 &nbsp;&nbsp;→ 2 reps left<br>
RPE 7 &nbsp;&nbsp;→ 3 reps left<br>
RPE 6 &nbsp;&nbsp;→ 4+ reps left, easy
</div>
<p>A target like <span class="num">RPE 8-9</span> means: pick a weight where you finish the set with about 1–2 reps still in you.</p>`;

function ex(name,sets,reps,rpe,weight,note){ return {name,sets,reps,rpe,weight,note}; }

function defaultProgram(){
  return {
    chest:[
      ex("Dumbbell Bench Press",3,"8-10","9",40,"per dumbbell"),
      ex("Incline Dumbbell Bench Press",3,"8-12","8-9",35,"per dumbbell"),
      ex("Mid Cable Fly (on bench)",3,"10-12","7-8",45,""),
      ex("Cable Chest Press (on bench)",3,"10-12","8-9",35,""),
      Object.assign(ex("Guillotine Press",3,"8-10","",30,""), {
        alt: ex("Chest Dips",3,"5-8","",null,"bodyweight — log added lbs if weighted")
      })
    ],
    back:[
      ex("Lat Pulldown",3,"8-10","8-9",130,""),
      ex("Mid Row",3,"8-10","8-9",130,""),
      ex("Dumbbell RDL",3,"8-10","9-10",35,"per dumbbell"),
      ex("Cable Lat Prayer",3,"10-12","8-9",null,"")
    ],
    arms:[
      ex("Incline Dumbbell Curl",3,"8-10","7-8",25,"per dumbbell"),
      ex("Tricep Pushdown",3,"8-10","8-9",100,""),
      ex("Preacher Curl",3,"8-10","9",25,"single arm — alternate L/R each set"),
      ex("Tricep Kickback",3,"8-10","8-9",30,""),
      ex("Spider Curl",3,"8-10","8-9",25,""),
      ex("Hammer Curl",3,"8-10","7-8",25,"per dumbbell"),
      ex("Cable Tricep Extension",3,"10-15","8-9",65,"")
    ],
    shoulders:[
      ex("Smith Machine Shoulder Press",3,"8-10","9",20,"10 lb plate each side"),
      ex("Alternating Cable Lateral Raise",3,"8-10","8-9",15,""),
      ex("Cable Reverse Rear Delt Fly",3,"8-10","8-10",30,"")
    ],
    legs:[
      ex("Leg Curl",2,"8-10","7-8",80,""),
      ex("Leg Extension",2,"8-10","7-8",55,""),
      ex("Hip Thrust",2,"8-10","7-8",80,""),
      ex("Smith Machine Squat",2,"5-8","9-10",50,"25 lb plate each side"),
      ex("Standing Calf Raise (Smith)",2,"10-12","8-9",30,"15 lb each side")
    ],
    finisher: defaultFinisher()
  };
}
function defaultFinisher(){
  return [
    ex("Cable Ab Crunch",2,"10-12","9-10",150,""),
    ex("Leg Raises",1,"8-10","9-10",null,"bodyweight")
  ];
}

let S = load();
migrate();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ return JSON.parse(raw); }
  }catch(e){}
  return {
    program: defaultProgram(),
    pointer: 0,
    override: null,
    sessions: [],
    active: null,
    sync: {token:"", gistId:"", lastSync:null},
    savedAt: Date.now()
  };
}
function migrate(){
  // add the alternating chest finisher if this device has an older program
  const ch = S.program && S.program.chest;
  if(ch && !ch.some(e => e.alt || /guillotine|chest dip/i.test(e.name))){
    ch.push(Object.assign(ex("Guillotine Press",3,"8-10","",30,""), {
      alt: ex("Chest Dips",3,"5-8","",null,"bodyweight — log added lbs if weighted")
    }));
    save();
  }
  if(S.program && !S.program.finisher){ S.program.finisher = defaultFinisher(); save(); }
  if(S.program && S.program.finisher){
    const f = S.program.finisher;
    const r2 = f.findIndex(e=>/round 2/i.test(e.name||""));
    if(r2 > -1){
      f.splice(r2,1);
      const crunch = f.find(e=>/cable ab crunch/i.test(e.name||""));
      if(crunch && crunch.sets < 2) crunch.sets = 2;
      save();
    }
  }
  if(S.sync && S.sync.repo===undefined){ S.sync.repo=""; S.sync.branch="main"; S.sync.lastRepo=null; save(); }
  if(!Array.isArray(S.cycleDone)) S.cycleDone = [];
  if(!S.cycleStart || !S.cycleV2){
    S.cycleStart = inferCycleStart();
    S.cycleV2 = true;
    save();
  }
  recomputeCycle(false);
}
function inferCycleStart(){
  // walk history backwards; sessions still fitting in one cycle belong to the current one
  const cap = {};
  ROTATION.forEach(id=>{ cap[id] = (cap[id]||0)+1; });
  const now = Date.now();
  let anchor = null, total = 0;
  const sess = [...S.sessions].sort((a,b)=>b.startedAt-a.startedAt);
  for(const s of sess){
    if(now - s.startedAt > 9*24*3600e3) break;   // older than ~9 days → previous cycle
    if(!(s.workoutId in cap)) continue;
    if(cap[s.workoutId] === 0) break;            // that day is already full → cycle boundary
    if(total >= ROTATION.length) break;
    cap[s.workoutId]--; total++;
    anchor = s.startedAt;
  }
  if(anchor != null) return anchor;
  const d = new Date(); d.setHours(0,0,0,0);
  return d.getTime();
}
function save(){
  S.savedAt = Date.now();
  localStorage.setItem(LS_KEY, JSON.stringify(S));
}

/* ================= HELPERS ================= */
const $ = sel => document.querySelector(sel);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => new Date().toLocaleDateString("en-CA");
const fmtDate = d => new Date(d+"T12:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2600); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------- celebrations ---------- */
const DAY_HEX = {chest:"#e05248", back:"#4a82e0", arms:"#e8b62c", shoulders:"#46a85c", legs:"#e9e5db"};
const FEELS = ["😞","🙁","😐","🙂","😄"];
function durFmt(s){
  if(!s.startedAt || !s.finishedAt) return null;
  const mins = Math.round((s.finishedAt - s.startedAt)/60000);
  if(mins < 1) return null;
  return mins >= 60 ? Math.floor(mins/60)+"h "+(mins%60)+"m" : mins+" min";
}
const PALETTE = Object.values(DAY_HEX);
const pick = a => a[Math.floor(Math.random()*a.length)];
function reducedMotion(){ return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; }
function celebrate(kind, wid, volume){
  if(reducedMotion()) return;
  const old = document.getElementById("celebrate");
  if(old) old.remove();
  const el = document.createElement("div");
  el.id = "celebrate";
  const isCycle = kind==="cycle";
  const color = isCycle ? "#eceae4" : (DAY_HEX[wid] || "#eceae4");
  const plateTxt = isCycle ? "7/7" : (META[wid] ? META[wid].short : "GG");
  const text = isCycle
    ? "FULL CYCLE<br>COMPLETE 🔁"
    : pick(["WORKOUT<br>CRUSHED 💪","IRON<br>CONQUERED 🏋️","ANOTHER ONE<br>DOWN 🔥","STRONGER THAN<br>YESTERDAY ⚡","PLATES DON'T LIFT<br>THEMSELVES 😤"]);
  el.innerHTML = `<div class="cele-bg"></div>
    <div class="cele-stack">
      <div class="slam" style="background:${color}">${plateTxt}</div>
      <div class="cele-text">${text}</div>
      ${volume>0 ? `<div class="cele-vol"><span class="vol-num">0</span> lb moved</div>` : ""}
    </div>
    <div class="cele-hint">tap to dismiss</div>`;
  // confetti storm — double for a full cycle
  const n = isCycle ? 110 : 60;
  for(let i=0;i<n;i++){
    const c = document.createElement("div");
    c.className = "confetto";
    const size = 7+Math.random()*9;
    c.style.left = (Math.random()*100)+"vw";
    c.style.width = size+"px";
    c.style.height = (size*(0.7+Math.random()))+"px";
    c.style.background = pick(PALETTE);
    c.style.borderRadius = Math.random()<0.35 ? "50%" : "3px";
    c.style.animationDuration = (1.7+Math.random()*1.4)+"s";
    c.style.animationDelay = (Math.random()*0.6)+"s";
    c.style.opacity = 0.75+Math.random()*0.25;
    el.appendChild(c);
  }
  document.body.appendChild(el);
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"), 650);
  // pounds-moved counter rolls up after the plate lands
  if(volume>0){
    const numEl = el.querySelector(".vol-num");
    const raf = window.requestAnimationFrame ? window.requestAnimationFrame.bind(window) : (cb=>setTimeout(()=>cb(Date.now()),16));
    const dur = 1300;
    let t0 = null;
    const tick = now=>{
      if(!el.isConnected) return;
      if(t0===null) t0 = now;
      const p = Math.min(1,(now-t0)/dur);
      const eased = 1-Math.pow(1-p,3);
      numEl.textContent = Math.round(volume*eased).toLocaleString();
      if(p<1) raf(tick);
    };
    setTimeout(()=>raf(tick), 700);
  }
  // graceful exit: fade out, or tap anywhere to dismiss early
  const dismiss = ()=>{
    if(!el.isConnected || el.classList.contains("out")) return;
    el.classList.add("out");
    setTimeout(()=>el.remove(), 480);
  };
  el.onclick = dismiss;
  setTimeout(dismiss, isCycle ? 5200 : 4300);
}
function prFloat(anchor){
  if(reducedMotion()) return;
  const r = anchor.getBoundingClientRect();
  const p = document.createElement("div");
  p.className = "pr-float";
  p.textContent = "PR! 🔥";
  p.style.left = Math.max(8, r.left + r.width/2 - 34) + "px";
  p.style.top = (r.top - 6) + "px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 1350);
}
function rpeTxt(v){ return v ? "RPE "+v : ""; }

/* auto-sync machinery */
let SYNC_ST = "off";
let syncTimer = null;
function syncDot(){
  if(!S.sync.gistId || !S.sync.token) return "";
  const c = SYNC_ST==="ok" ? "var(--ok)" : SYNC_ST==="err" ? "var(--bad)" : "var(--faint)";
  return `<span class="syncdot" style="background:${c}" title="Sync status"></span>`;
}
function setSyncStatus(st){
  SYNC_ST = st;
  const d = document.querySelector(".syncdot");
  if(d){
    d.style.background = st==="ok" ? "var(--ok)" : st==="err" ? "var(--bad)" : "var(--faint)";
    d.classList.toggle("pulse", st==="pending");
  }
}
function queueSync(){
  if(!S.sync.token || !S.sync.gistId) return;
  setSyncStatus("pending");
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>syncNow(false), 2000);
}

function todaysWorkoutId(){
  if(S.override && S.override.date === todayStr()) return S.override.workoutId;
  return ROTATION[S.pointer];
}
function altIndex(wid){
  return S.sessions.filter(s=>s.workoutId===wid).length % 2;
}
function activeVariant(wid, e){
  if(!e.alt) return e;
  return altIndex(wid)===0 ? e : e.alt;
}
function widName(wid){ return wid==="finisher" ? "Finisher" : META[wid].name; }
function resolvedProgram(wid){
  const main = S.program[wid].map(e=>{
    const v = activeVariant(wid, e);
    return {chosen:v, other: e.alt ? (v===e ? e.alt : e) : null, isFinisher:false};
  });
  const fin = (S.program.finisher||[]).map(e=>({chosen:e, other:null, isFinisher:true}));
  return main.concat(fin);
}
function lastEntryFor(workoutId, exName){
  // same-day sessions first (best comparison), then any session (covers the everyday finisher)
  for(let pass=0; pass<2; pass++){
    for(let i=S.sessions.length-1;i>=0;i--){
      const s = S.sessions[i];
      if(pass===0 && s.workoutId!==workoutId) continue;
      const e = s.entries.find(en=>en.name===exName);
      if(e) return {sets:e.sets, date:s.date};
    }
  }
  return null;
}
function lastSetsFor(workoutId, exName){
  const l = lastEntryFor(workoutId, exName);
  return l ? l.sets : null;
}
function lastBox(workoutId, exName){
  const l = lastEntryFor(workoutId, exName);
  if(!l) return null;
  const sets = l.sets.filter(st=>st.reps||st.weight);
  if(!sets.length) return null;
  const d = new Date(l.date+"T12:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"});
  const color = META[workoutId] ? META[workoutId].color : "var(--dim)";
  return `<div class="ex-last" style="border-left-color:${color}">
    <span class="ll-tag">Last<br>${esc(d)}</span>
    ${sets.map(st=>`<span class="ll-set">${esc(fmtSetShort(st))}</span>`).join("")}
  </div>`;
}
function exHistory(name, n){
  const out = [];
  for(let i=S.sessions.length-1; i>=0 && out.length<n; i--){
    const e = S.sessions[i].entries.find(en=>en.name===name);
    if(e){
      const sets = e.sets.filter(st=>st.reps||st.weight);
      if(sets.length) out.push({date:S.sessions[i].date, sets});
    }
  }
  return out; // newest first
}
function insight(exName){
  const h = exHistory(exName, 3);
  if(h.length < 2) return null;
  const top = sess => sess.sets.reduce((b,st)=>{
    const w = parseFloat(st.weight)||0, r = parseFloat(st.reps)||0;
    return (!b || w>b.w || (w===b.w && r>b.r)) ? {w,r} : b;
  }, null);
  const avgRpe = sess => {
    const a = sess.sets.map(st=>parseFloat(st.rpe)).filter(x=>!isNaN(x));
    return a.length ? a.reduce((x,y)=>x+y,0)/a.length : NaN;
  };
  const t0 = top(h[0]), t1 = top(h[1]);
  const isBw = t0.w === 0; // no load logged = bodyweight movement
  if(t0.w > t1.w){
    return {tag:"Trend", msg: t1.w===0
      ? "Added load to a bodyweight movement — see how it holds"
      : "Moved up from "+t1.w+" lb last session — see how it holds"};
  }
  if(t0.w === t1.w){
    const tOld = top(h[h.length-1]);
    const at = isBw ? "" : "at "+t0.w+" lb ";
    if(tOld.w===t0.w && t0.r - tOld.r >= 2){
      return {tag:"Trend", msg:"Reps climbing "+at+"("+tOld.r+" → "+t0.r+")"+(isBw
        ? " — bodyweight is getting comfortable"
        : " — may be ready for more weight")};
    }
    if(t1.r - t0.r >= 2){
      return {tag:"Watch", msg:"Reps dipped "+at+"("+t1.r+" → "+t0.r+") — could be fatigue"};
    }
  }
  const r0 = avgRpe(h[0]), r1 = avgRpe(h[1]);
  if(!isNaN(r0) && !isNaN(r1) && r0>=9.3 && r1>=9.3){
    return {tag:"Watch", msg:"Consistently near failure here two sessions running"};
  }
  return null;
}
function fmtSet(st){
  if(!st) return "—";
  let out = (st.weight!=null && st.weight!=="" ? st.weight : "bw") + "×" + (st.reps||"?");
  if(st.rpe) out += " · RPE "+st.rpe;
  return out;
}

/* ================= RENDER ================= */
let TAB = "today";
document.querySelectorAll("nav button").forEach(b=>{
  b.onclick = ()=>{ TAB=b.dataset.tab; document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x===b)); render(); window.scrollTo(0,0); };
});

function render(){
  const app = $("#app");
  if(TAB==="today") app.innerHTML = viewToday();
  else if(TAB==="history") app.innerHTML = viewHistory();
  else if(TAB==="program") app.innerHTML = viewProgram();
  else app.innerHTML = viewSync();
  bind();
}

function plateStrip(){
  const cur = S.pointer;
  let html = '<div class="plates-wrap"><div class="plates">';
  ROTATION.forEach((id,i)=>{
    const m = META[id];
    const done = S.cycleDone.includes(i);
    const cls = "plate" + (i===cur?" cur":"") + (done?" done":"");
    html += `<button class="${cls}" data-slot="${i}" style="background:${m.color}" aria-label="Slot ${i+1}: ${m.name}${done?" (done)":""}">${m.short}<small>${i+1}</small>${done?'<span class="pcheck">✓</span>':""}</button>`;
  });
  const restUsed = !!(S.restDay && S.restDay.date);
  const restingToday = restUsed && S.restDay.date===todayStr();
  html += `<button class="plate rest${restingToday?" cur":""}${restUsed?" done":""}" id="restPlate" aria-label="Rest day${restUsed?" (used)":""}">R<small>rest</small>${restUsed?'<span class="pcheck">✓</span>':""}</button>`;
  html += "</div>";
  html += `<div class="cycle-row"><span class="num">${S.cycleDone.length} of ${ROTATION.length} done · rest ${restUsed?(restingToday?"today":"used"):"available"}</span><span>${S.lastReview?'<button id="lastReviewBtn">last review</button> ':''}<button id="cycleReset">reset cycle</button></span></div>`;
  return html + "</div>";
}

/* ---------- TODAY ---------- */
function viewToday(){
  const wid = todaysWorkoutId();
  const m = META[wid];
  let h = `<div class="hdr"><h1>Iron Log${syncDot()}</h1><span class="date num">${fmtDate(todayStr())}</span></div>`;
  h += plateStrip();

  if(S.active){
    return h + viewActiveSession();
  }

  if(S.restDay && S.restDay.date === todayStr()){
    h += `<div class="card" style="text-align:center;padding:34px 20px">
      <h3 style="font-size:26px">Rest day</h3>
      <div class="sub" style="margin-top:8px">Recovery is where the growth happens. Your rotation picks back up tomorrow with <b>${m.name}</b>.</div>
    </div>`;
    h += `<div class="btn-row"><button class="btn ghost" id="undoRestBtn">Actually, train today</button></div>`;
    return h;
  }

  h += `<div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <span class="dot" style="background:${m.color};width:17px;height:17px"></span>
      <h3 style="font-size:26px">${m.name} day</h3>
    </div>
    <div class="sub">Next up in your rotation. Tap a plate above to move your week, or pick a different workout below.</div>
  </div>`;

  h += `<div class="card">`;
  let finLabeled = false;
  resolvedProgram(wid).forEach(({chosen:e, other, isFinisher})=>{
    if(isFinisher && !finLabeled){ h += `<div class="fin-label">Finisher — every workout</div>`; finLabeled = true; }
    const ll = lastBox(wid, e.name);
    const ins = insight(e.name);
    h += `<div class="ex-head"><b>${esc(e.name)}${other?'<span class="alt-badge">⇄</span>':''}</b><span class="ex-target">${e.sets}×${esc(e.reps)}${e.rpe?' · <span class="rpe-help" title="Tap for what RPE means">'+esc(rpeTxt(e.rpe))+'</span>':""}</span></div>`;
    if(ll) h += ll;
    if(ins) h += `<div class="ex-insight"><span class="ins-tag">${esc(ins.tag)}</span><span>${esc(ins.msg)}</span></div>`;
    let subBits = [];
    if(!ll) subBits.push('no sessions logged yet');
    if(other) subBits.push('alternates with '+esc(other.name)+' next '+m.name.toLowerCase()+' day');
    if(e.note) subBits.push(esc(e.note));
    if(subBits.length) h += `<div class="sub" style="margin:-2px 0 12px">${subBits.join(' · ')}</div>`;
    else h += `<div style="margin-bottom:12px"></div>`;
  });
  h += `</div>`;

  h += `<button class="btn" id="startBtn">Start ${m.name} workout</button>`;
  h += `<div class="btn-row"><button class="btn ghost" id="swapBtn">Do a different workout</button></div>`;
  return h;
}
function bestSet(sets){
  let best=null;
  sets.forEach(s=>{
    if(s.reps==null||s.reps==="") return;
    const w = parseFloat(s.weight)||0;
    if(!best || w>(parseFloat(best.weight)||0)) best=s;
  });
  return best || sets[0];
}

function viewActiveSession(){
  const a = S.active;
  const m = META[a.workoutId];
  let h = `<div class="card">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="dot" style="background:${m.color};width:17px;height:17px"></span>
      <h3 style="font-size:24px">${m.name} — in progress</h3>
    </div>
    <div class="sub">Started ${new Date(a.startedAt).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}. Fill sets as you go — tapping ✓ on an empty row copies last time's numbers. Tap <span class="rpe-help">RPE</span> anywhere to see what it means.</div>
  </div>`;

  let finLab = false;
  a.entries.forEach((en,ei)=>{
    if(en.fin && !finLab){ h += `<div class="fin-label">Finisher</div>`; finLab = true; }
    const last = lastSetsFor(a.workoutId, en.name);
    const ll = lastBox(a.workoutId, en.name);
    h += `<div class="card ex">
      <div class="ex-head"><b>${esc(en.name)}</b>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="ex-target">${en.sets.length}×${esc(en.reps||"")}${en.rpe?' · <span class="rpe-help" title="Tap for what RPE means">'+esc(rpeTxt(en.rpe))+'</span>':""}</span>
          <span class="icon-btns ex-ctl">
            <button data-exup="${ei}" aria-label="Move earlier">↑</button>
            <button data-exdown="${ei}" aria-label="Move later">↓</button>
            <button data-exskip="${ei}" aria-label="Skip today">✕</button>
          </span>
        </span>
      </div>`;
    if(ll) h += ll;
    if(en.note) h += `<div class="ex-note">${esc(en.note)}</div>`;
    h += `<div class="set-labels"><span>set</span><span>lbs</span><span>reps</span><span class="rpe-help" title="Tap for what RPE means">rpe ⓘ</span><span>✓</span></div>`;
    en.sets.forEach((st,si)=>{
      h += `<div class="set">
        <span class="idx">${si+1}</span>
        <input inputmode="decimal" data-e="${ei}" data-s="${si}" data-f="weight" value="${st.weight??""}" placeholder="${last&&last[si]&&last[si].weight!=null&&last[si].weight!==""?last[si].weight:"lbs"}">
        <input inputmode="numeric" data-e="${ei}" data-s="${si}" data-f="reps" value="${st.reps??""}" placeholder="${last&&last[si]&&last[si].reps?last[si].reps:"reps"}">
        <select data-e="${ei}" data-s="${si}" data-f="rpe">${rpeOptions(st.rpe)}</select>
        <button class="chk ${st.done?"on":""}" data-e="${ei}" data-s="${si}" data-f="done">✓</button>
      </div>`;
    });
    h += `<div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn ghost small" data-addset="${ei}">+ set</button>
      <button class="btn ghost small" data-rmset="${ei}">− set</button>
    </div></div>`;
  });

  h += `<div class="card">
    <h3 style="font-size:17px">Session note</h3>
    <div class="field" style="margin:8px 0 0"><input id="sessNote" placeholder="optional — how did it go? sleep, tweaks, pump..." value="${esc(a.note||"")}"></div>
    <div class="sub" style="margin-top:12px">How did it feel?</div>
    <div class="feel-row">${FEELS.map((f,i)=>`<button class="feel-btn ${a.feel===i+1?"on":""}" data-feel="${i+1}">${f}</button>`).join("")}</div>
  </div>`;
  h += `<button class="btn" id="finishBtn">Finish workout</button>`;
  h += `<div class="btn-row"><button class="btn ghost" id="discardBtn">Discard</button></div>`;
  return h;
}
function rpeOptions(v){
  const opts = ["","6","6.5","7","7.5","8","8.5","9","9.5","10"];
  return opts.map(o=>`<option value="${o}" ${String(v??"")===o?"selected":""}>${o===""?"RPE":o}</option>`).join("");
}

      S.override = null;
      save(); queueSync(); render();
    };
  });

  document.querySelectorAll("#app [data-feel]").forEach(b=> b.onclick=()=>{

  const rSave = $("#repoSaveBtn");

    S.sync.token = $("#tokenIn").value.trim() || S.sync.token;
    S.sync.repo = $("#repoIn").value.trim().replace(/^https?:\/\/github\.com\//,"").replace(/\/+$/,"");

/* ---------- workout flow ---------- */
function startWorkout(wid){
  S.active = {
    id: uid(),
    workoutId: wid,
    date: todayStr(),
    startedAt: Date.now(),
    entries: resolvedProgram(wid).map(({chosen:e, isFinisher})=>({
      name: e.name, reps: e.reps, rpe: e.rpe, note: e.note, fin: isFinisher||undefined,
      sets: Array.from({length:e.sets}, ()=>({weight:"",reps:"",rpe:"",done:false}))
    }))
  };
  save(); render();
}
function finishWorkout(){
  const a = S.active;
  const logged = a.entries.some(e=>e.sets.some(st=>st.done || st.reps));
  if(!logged && !confirm("No sets logged — finish anyway?")) return;
  a.entries.forEach(e=>{ e.sets = e.sets.filter(st=>st.done || st.reps || st.weight); });
  a.entries = a.entries.filter(e=>e.sets.length);
  a.finishedAt = Date.now();
  const wid = a.workoutId;
  const noteEl = $("#sessNote");
  if(noteEl) a.note = noteEl.value.trim();
  const vol = a.entries.reduce((t,e)=>t+e.sets.reduce((u,st)=>u+((parseFloat(st.weight)||0)*(parseFloat(st.reps)||0)),0),0);
  S.sessions.push({id:a.id, workoutId:a.workoutId, date:a.date, startedAt:a.startedAt, finishedAt:a.finishedAt, entries:a.entries, note:a.note||"", feel:a.feel||null});
  S.active = null;
  const cycleFinished = recomputeCycle(true);
  S.override = null;
  save(); render();
  celebrate(cycleFinished ? "cycle" : "workout", wid, Math.round(vol));
  if(cycleFinished && S.lastReview) openCycleReview(S.lastReview);
  toast("Workout saved 💪");
  if(S.sync.gistId) syncNow(false);
  if(S.sync.repo) repoBackup(false);
}
function recomputeCycle(announce){
  // the cycle's checkmarks are always derived from actual logged sessions since cycleStart
  const done = [];
  S.sessions
    .filter(s=>s.startedAt >= S.cycleStart)
    .sort((a,b)=>a.startedAt-b.startedAt)
    .forEach(s=>{
      for(let i=0;i<ROTATION.length;i++){
        if(ROTATION[i]===s.workoutId && !done.includes(i)){ done.push(i); break; }
      }
    });
  if(done.length >= ROTATION.length){
    // full cycle in the books → capture the review, then start fresh
    S.lastReview = buildCycleReview();
    S.lastCycle = {start:S.cycleStart, end:Date.now()};
    S.cycleStart = Date.now();
    S.cycleDone = [];
    S.restDay = null;
    if(announce) toast("Cycle complete — starting a fresh one 🔁");
    save();
    return true;
  } else {
    S.cycleDone = done;
  }
  // if the suggested day is already done, move to the next unchecked one
  if(S.cycleDone.includes(S.pointer)){
    for(let k=1;k<=ROTATION.length;k++){
      const idx = (S.pointer+k)%ROTATION.length;
      if(!S.cycleDone.includes(idx)){ S.pointer = idx; break; }
    }
  }
  save();
  return false;
}
function openPicker(){
  let h = `<h3>Pick today's workout</h3><div class="picker">`;
  Object.keys(META).forEach(id=>{
    h += `<button data-pick="${id}"><span class="dot" style="background:${META[id].color}"></span>${META[id].name}</button>`;
  });
  h += `</div><button class="btn ghost" style="margin-top:14px" id="closeModal">Cancel</button>`;
  showModal(h);
  document.querySelectorAll("[data-pick]").forEach(b=> b.onclick=()=>{
    S.override = {date: todayStr(), workoutId: b.dataset.pick};
    save(); hideModal(); render();
  });
}

  const dayLabel = wid==="finisher" ? "session" : widName(wid).toLowerCase()+" day";

/* ---------- cycle review ---------- */
function cycleSummary(start, end){
  const sess = S.sessions.filter(s=>s.startedAt>=start && s.startedAt<=end);
  let vol = 0, durTotal = 0, durN = 0, feelTotal = 0, feelN = 0;
  const perDay = {}, exTop = {};
  sess.forEach(s=>{
    perDay[s.workoutId] = (perDay[s.workoutId]||0)+1;
    if(s.startedAt && s.finishedAt && s.finishedAt>s.startedAt){ durTotal += (s.finishedAt-s.startedAt); durN++; }
    if(s.feel){ feelTotal += s.feel; feelN++; }
    s.entries.forEach(e=>{
      e.sets.forEach(st=>{ vol += (parseFloat(st.weight)||0)*(parseFloat(st.reps)||0); });
      const t = e.sets.reduce((b,st)=>{
        const w = parseFloat(st.weight)||0;
        return b==null||w>b ? w : b;
      }, null);
      if(t!=null) exTop[e.name] = Math.max(exTop[e.name]||0, t);
    });
  });
  const avgDurMin = durN ? Math.round(durTotal/durN/60000) : null;
  const avgFeel = feelN ? Math.round(feelTotal/feelN*10)/10 : null;
  return {vol:Math.round(vol), n:sess.length, perDay, exTop, avgDurMin, avgFeel};
}
function buildCycleReview(){
  const now = Date.now();
  const cur = cycleSummary(S.cycleStart, now);
  const prev = S.lastCycle ? cycleSummary(S.lastCycle.start, S.lastCycle.end) : null;
  const moved = [], stalled = [];
  if(prev){
    Object.keys(cur.exTop).forEach(name=>{
      if(!(name in prev.exTop)) return;
      const d = cur.exTop[name] - prev.exTop[name];
      if(d > 0) moved.push({name, from:prev.exTop[name], to:cur.exTop[name]});
      else if(d === 0 && cur.exTop[name] > 0) stalled.push({name, w:cur.exTop[name]});
    });
  }
  return {cur, prevVol: prev?prev.vol:null, moved:moved.slice(0,6), stalled:stalled.slice(0,6), when:now};
}
function openCycleReview(r){
  if(!r || !r.cur) return;
  const pct = (r.prevVol && r.prevVol>0) ? Math.round((r.cur.vol - r.prevVol)/r.prevVol*100) : null;
  const dayLine = Object.keys(META).filter(k=>r.cur.perDay[k]).map(k=>META[k].name+" ×"+r.cur.perDay[k]).join(" · ");
  let h = `<h3>Cycle review</h3>
  <div class="rev-stat"><span class="num" style="font-size:26px;font-weight:600">${r.cur.vol.toLocaleString()} lb</span> total volume
    ${pct!=null?`<span class="num" style="color:${pct>=0?"var(--ok)":"var(--bad)"};margin-left:8px">${pct>=0?"+":""}${pct}% vs last cycle</span>`:""}</div>
  <div class="rev-stat">${r.cur.n} workouts — ${esc(dayLine)}</div>
  ${r.cur.avgDurMin?`<div class="rev-stat">Average workout: <span class="num">${r.cur.avgDurMin} min</span></div>`:""}
  ${r.cur.avgFeel?`<div class="rev-stat">Average feel: ${FEELS[Math.min(4,Math.max(0,Math.round(r.cur.avgFeel)-1))]} <span class="num">${r.cur.avgFeel}/5</span></div>`:""}`;
  if(r.moved.length){
    h += `<div class="rev-head">Moved up</div>`;
    r.moved.forEach(m=>{ h += `<div class="rev-line"><b>${esc(m.name)}</b><span class="num">${m.from} → ${m.to} lb</span></div>`; });
  }
  if(r.stalled.length){
    h += `<div class="rev-head">Held steady</div>`;
    r.stalled.forEach(m=>{ h += `<div class="rev-line"><b>${esc(m.name)}</b><span class="num">${m.w} lb</span></div>`; });
  }
  if(!r.moved.length && !r.stalled.length && r.prevVol==null){
    h += `<div class="sub" style="margin-top:10px">First full cycle logged — from the next one on, this review compares against it.</div>`;
  }
  h += `<button class="btn" style="margin-top:16px" id="closeModal">Done</button>`;
  showModal(h);
}

/* ================= GIST SYNC ================= */
async function gistFetch(path, opts={}){
  const res = await fetch("https://api.github.com/"+path, {
    ...opts,
    headers: {
      "Accept":"application/vnd.github+json",
      "Authorization":"Bearer "+S.sync.token,
      ...(opts.headers||{})
    }
  });
  if(!res.ok){
    let msg = res.status+"";
    try{ msg += " "+(await res.json()).message; }catch(e){}
    throw new Error(msg);
  }
  return res.json();
}
function payload(){
  return JSON.stringify({program:S.program, pointer:S.pointer, cycleStart:S.cycleStart, cycleDone:S.cycleDone, restDay:S.restDay||null, lastCycle:S.lastCycle||null, lastReview:S.lastReview||null, sessions:S.sessions, savedAt:S.savedAt}, null, 1);
}
async function connectGist(){
  S.sync.token = $("#tokenIn").value.trim();
  S.sync.gistId = $("#gistIn").value.trim();
  if(!S.sync.token){ toast("Paste a token first"); return; }
  save();
  try{
    if(!S.sync.gistId){
      const g = await gistFetch("gists", {method:"POST", body: JSON.stringify({
        description:"Iron Log — workout data", public:false,
        files:{[GIST_FILE]:{content:payload()}}
      })});
      S.sync.gistId = g.id;
      S.sync.lastSync = Date.now();
      save(); render();
      toast("Gist created — you're synced");
    } else {
      save(); render();
      await syncNow(true);
    }
  }catch(err){ toast("GitHub error: "+err.message); }
}
async function syncNow(announce){
  if(!S.sync.token || !S.sync.gistId){ if(announce) toast("Connect first"); return; }
  try{
    const g = await gistFetch("gists/"+S.sync.gistId);
    const f = g.files && g.files[GIST_FILE];
    let remote = null;
    if(f){
      let content = f.content;
      if(f.truncated){ content = await (await fetch(f.raw_url)).text(); }
      try{ remote = JSON.parse(content); }catch(e){}
    }
    if(remote && remote.savedAt > S.savedAt){
      const ids = new Set(remote.sessions.map(s=>s.id));
      const extra = S.sessions.filter(s=>!ids.has(s.id));
      S.program = remote.program;
      S.pointer = remote.pointer;
      if(remote.cycleStart) S.cycleStart = remote.cycleStart;
      if(remote.restDay!==undefined) S.restDay = remote.restDay;
      if(remote.lastCycle) S.lastCycle = remote.lastCycle;
      if(remote.lastReview) S.lastReview = remote.lastReview;
      S.sessions = remote.sessions.concat(extra).sort((a,b)=>a.startedAt-b.startedAt);
      recomputeCycle(false);
      save();
    } else if(remote){
      const ids = new Set(S.sessions.map(s=>s.id));
      const extra = (remote.sessions||[]).filter(s=>!ids.has(s.id));
      if(extra.length){
        S.sessions = S.sessions.concat(extra).sort((a,b)=>a.startedAt-b.startedAt);
        recomputeCycle(false);
        save();
      }
    }
    await gistFetch("gists/"+S.sync.gistId, {method:"PATCH", body: JSON.stringify({files:{[GIST_FILE]:{content:payload()}}})});
    S.sync.lastSync = Date.now();
    save();
    setSyncStatus("ok");
    if(TAB==="sync"||announce) render();
    if(announce) toast("Synced ✓");
  }catch(err){ setSyncStatus("err"); toast("Sync failed: "+err.message); }
}

/* ---------- formal training report ---------- */
function longDate(d){
  return new Date(d+"T12:00:00").toLocaleDateString(undefined,{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
function setSentence(st){
  const w = (st.weight!=null && st.weight!=="") ? st.weight+" lb" : "bodyweight";
  let s = w+" × "+(st.reps||"?")+" reps";
  if(st.rpe) s += " at RPE "+st.rpe;
  return s;
}
function joinList(arr){
  if(arr.length<=1) return arr.join("");
  return arr.slice(0,-1).join(", ")+", and "+arr[arr.length-1];
}
function buildReportHTML(){
  const sessions = [...S.sessions].sort((a,b)=>a.startedAt-b.startedAt);
  const first = sessions[0], lastS = sessions[sessions.length-1];
  const counts = {};
  sessions.forEach(s=>{ counts[s.workoutId]=(counts[s.workoutId]||0)+1; });
  const countLine = joinList(Object.keys(counts).map(k=>counts[k]+" "+META[k].name.toLowerCase()+" "+(counts[k]===1?"session":"sessions")));

  let body = `<h1>Training History Report</h1>
  <p class="meta">Prepared ${new Date().toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"})} · Iron Log</p>
  <p>This report covers <b>${sessions.length}</b> logged training ${sessions.length===1?"session":"sessions"} from ${longDate(first.date)} through ${longDate(lastS.date)}, comprising ${countLine}.</p>
  <hr>`;

  sessions.forEach(s=>{
    const m = META[s.workoutId];
    const vol = s.entries.reduce((t,e)=>t+e.sets.reduce((u,st)=>u+((parseFloat(st.weight)||0)*(parseFloat(st.reps)||0)),0),0);
    const dur = durFmt(s);
    const metaBits = [];
    if(dur) metaBits.push("Duration: "+dur);
    if(s.feel) metaBits.push("Feel: "+FEELS[s.feel-1]+" ("+s.feel+"/5)");
    if(s.note) metaBits.push("Note: "+esc(s.note));
    body += `<h2>${longDate(s.date)} — ${m.name} Day</h2>
    ${metaBits.length?`<p class="meta">${metaBits.join(" · ")}</p>`:""}
    <table><thead><tr><th>Exercise</th><th>Set</th><th>Weight (lb)</th><th>Reps</th><th>RPE</th></tr></thead><tbody>`;
    s.entries.forEach(e=>{
      const sets = e.sets.filter(st=>st.reps||st.weight);
      if(!sets.length) return;
      sets.forEach((st,i)=>{
        body += `<tr>${i===0?`<td rowspan="${sets.length}"><b>${esc(e.name)}</b></td>`:""}
          <td class="c">${i+1}</td>
          <td class="c">${st.weight!=null&&st.weight!==""?esc(st.weight):"bodyweight"}</td>
          <td class="c">${esc(st.reps||"")}</td>
          <td class="c">${esc(st.rpe||"—")}</td></tr>`;
      });
    });
    body += `</tbody></table>`;
    if(vol>0) body += `<p class="meta">Total working volume: ${Math.round(vol).toLocaleString()} lb.</p>`;
  });

  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Training History Report</title>
  <style>
    body{font-family:Georgia,'Times New Roman',serif;color:#111;background:#fff;max-width:7.2in;margin:36px auto;padding:0 20px;line-height:1.55;font-size:12.5pt}
    h1{font-size:22pt;margin:0 0 2px;border-bottom:3px solid #111;padding-bottom:8px}
    h2{font-size:14pt;margin:26px 0 6px}
    p{margin:5px 0}
    .meta{color:#555;font-size:10.5pt;font-style:italic}
    table{width:100%;border-collapse:collapse;margin:8px 0 4px;font-size:10.5pt}
    th,td{border:1px solid #999;padding:5px 9px;text-align:left;vertical-align:top}
    th{background:#eee;font-size:9pt;text-transform:uppercase;letter-spacing:.05em}
    td.c{text-align:center;font-variant-numeric:tabular-nums}
    tr{page-break-inside:avoid}
    hr{border:none;border-top:1px solid #bbb;margin:18px 0}
    .noprint{position:fixed;top:14px;right:14px;padding:10px 18px;font:bold 12pt sans-serif;cursor:pointer;background:#111;color:#fff;border:none;border-radius:8px}
    @media print{.noprint{display:none}}
  </style></head><body>
  <button class="noprint" onclick="window.print()">Print / Save as PDF</button>
  ${body}</body></html>`;
}
function openReport(){
  if(!S.sessions.length){ toast("Nothing to report yet"); return; }
  const html = buildReportHTML();
  const w = window.open("", "_blank");
  if(w){ w.document.write(html); w.document.close(); }
  else { // popup blocked → download the HTML instead
    const blob = new Blob([html], {type:"text/html"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "training-report-"+todayStr()+".html";
    a.click();
    URL.revokeObjectURL(a.href);
    toast("Popup blocked — downloaded the report instead");
  }
}
function downloadDoc(){
  if(!S.sessions.length){ toast("Nothing to report yet"); return; }
  const blob = new Blob(["\ufeff"+buildReportHTML()], {type:"application/msword"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "training-report-"+todayStr()+".doc";
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ---------- repo backup (CSV + JSON committed to the GitHub repo) ---------- */
function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function fmtSetShort(st){
  const w = (st.weight!=null && st.weight!=="") ? st.weight : "bw";
  let s = w+"×"+(st.reps||"?");
  if(st.rpe) s += " @"+st.rpe;
  return s;
}
function buildCSV(){
  const sessions = [...S.sessions].sort((a,b)=>b.startedAt-a.startedAt);
  let maxSets = 1;
  sessions.forEach(s=>s.entries.forEach(e=>{
    const n = e.sets.filter(st=>st.reps||st.weight).length;
    if(n>maxSets) maxSets = n;
  }));
  const header = ["Exercise"];
  for(let i=1;i<=maxSets;i++) header.push("Set "+i);
  const rows = [header];
  sessions.forEach(s=>{
    rows.push([s.date+" — "+META[s.workoutId].name.toUpperCase(), s.note||"", ...Array(Math.max(0,maxSets-1)).fill("")]);
    s.entries.forEach(e=>{
      const sets = e.sets.filter(st=>st.reps||st.weight);
      if(!sets.length) return;
      const row = [e.name];
      for(let i=0;i<maxSets;i++) row.push(sets[i] ? fmtSetShort(sets[i]) : "");
      rows.push(row);
    });
    rows.push(Array(maxSets+1).fill(""));
  });
  return rows.map(r=>r.map(v=>{
    v = String(v==null?"":v);
    return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  }).join(",")).join("\n");
}
async function repoPut(path, content, message){
  const branch = S.sync.branch || "main";
  for(let attempt=1; attempt<=3; attempt++){
    let sha = null;
    try{
      const cur = await gistFetch("repos/"+S.sync.repo+"/contents/"+encodeURIComponent(path)+"?ref="+branch+"&t="+Date.now());
      sha = cur.sha;
    }catch(e){ /* file doesn't exist yet — first commit */ }
    const body = {message, content: b64(content), branch};
    if(sha) body.sha = sha;
    try{
      await gistFetch("repos/"+S.sync.repo+"/contents/"+encodeURIComponent(path), {method:"PUT", body: JSON.stringify(body)});
      return;
    }catch(err){
      // 409 = another commit landed between our read and write — refetch sha and retry
      if(String(err.message).startsWith("409") && attempt<3){
        await new Promise(r=>setTimeout(r, 900*attempt));
        continue;
      }
      throw err;
    }
  }
}
let repoBusy = false, repoAgain = false;
async function repoBackup(announce){
  if(!S.sync.token || !S.sync.repo){ if(announce) toast("Add your repo in the Sync tab first"); return; }
  if(repoBusy){ repoAgain = true; return; }
  repoBusy = true;
  try{
    const stamp = new Date().toLocaleString();
    await repoPut("workout-log.csv", buildCSV(), "Workout log update — "+stamp);
    await repoPut("ironlog-backup.json", payload(), "Data backup — "+stamp);
    S.sync.lastRepo = Date.now();
    save();
    setSyncStatus("ok");
    if(announce){ toast("Backed up to repo ✓"); if(TAB==="sync") render(); }
  }catch(err){
    setSyncStatus("err");
    toast("Repo backup failed: "+err.message);
  }finally{
    repoBusy = false;
    if(repoAgain){ repoAgain = false; repoBackup(false); }
  }
}

/* ---------- backup ---------- */
function exportJSON(){
  const blob = new Blob([payload()], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ironlog-backup-"+todayStr()+".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const d = JSON.parse(r.result);
      if(!d.program || !Array.isArray(d.sessions)) throw new Error("not an Iron Log file");
      S.program = d.program;
      S.pointer = d.pointer||0;
      if(d.cycleStart) S.cycleStart = d.cycleStart;
      S.sessions = d.sessions;
      recomputeCycle(false);
      save(); queueSync(); render(); toast("Imported ✓");
    }catch(err){ toast("Import failed: "+err.message); }
  };
  r.readAsText(file);
  e.target.value = "";
}
